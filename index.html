<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<!-- ECharts loaded async at end of body -->
<style>
:root{
  --bg:#f3edd9; --bg2:#e8dfc8; --card:linear-gradient(180deg,#f6f0df 0%,#efe6cf 100%); --card2:linear-gradient(180deg,#f3ebd6 0%,#e9dcc0 100%);
  --gold:#8c6b48; --gold2:#a08060; --gold3:#c8b898;
  --red:#5c2018; --red2:#8b3a30; --red3:#dcc8b8;
  --ink:#222222; --ink2:#3d3028; --ink3:#6b5840; --ink4:#9b8870;
  --jade:#4a6b50; --jade2:#7a9b80;
  --blue:#3a4a60; --blue2:#6a7a90;
  --border:rgba(74,56,39,0.2); --border2:rgba(74,56,39,0.35);
  --shadow:0 2px 16px rgba(34,34,34,0.06);
  --radius:6px; --radius2:4px;
  --font-serif:'Noto Serif SC','STSong','SimSun','Songti SC',serif;
  --font-sans:'Noto Serif SC','STSong','SimSun','Songti SC',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-serif);background:var(--bg);color:var(--ink);line-height:1.8;font-weight:700}
body::before{content:'';position:fixed;inset:0;background:url('bg_main.gif') center/cover fixed no-repeat;opacity:.70;pointer-events:none;z-index:0}
#bgVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 35%;z-index:-1;opacity:.7;pointer-events:none;transform:scale(1.3)}
/* Paper grain overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px 200px}

/* SCROLLBAR */
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(246,240,223,0.15);border-bottom:none;padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between;box-shadow:none}
.header-l{display:flex;align-items:center;gap:14px}
.hlogo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red2));display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:24px;font-weight:900;color:#fff;border:3px solid var(--gold3);box-shadow:0 2px 8px rgba(139,26,26,0.2)}
.htitle{font-family:var(--font-serif);font-size:20px;font-weight:700;letter-spacing:3px;color:var(--red)}
.htitle span{color:var(--gold)}
.hsub{font-size:10px;color:var(--ink3);letter-spacing:1px}
.hnav{display:flex;gap:2px}
.hnav button{background:none;border:none;color:var(--ink2);padding:8px 16px;border-radius:0;cursor:pointer;font-family:var(--font-serif);font-size:14px;font-weight:600;transition:all .3s;letter-spacing:3px;position:relative}
.hnav button::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--red2);transition:width .3s}
.hnav button:hover{color:var(--ink);text-shadow:0 0 1px rgba(0,0,0,0.3)}
.hnav button:hover::after{width:60%}
.hnav button.active{color:var(--red);font-weight:700;text-shadow:0 0 1px rgba(92,32,24,0.2)}
.hnav button.active::after{width:80%;height:2px;background:var(--red)}
.hsearch{position:relative;width:260px}
.hsearch input{width:100%;padding:9px 38px 9px 16px;background:var(--card);border:none;border-radius:24px;color:var(--ink);font-family:inherit;font-size:13px;outline:none;transition:all .3s;box-shadow:0 1px 4px rgba(34,34,34,0.06)}
.hsearch input:focus{box-shadow:0 2px 8px rgba(140,107,72,0.15)}
.sicon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--ink4);pointer-events:none;font-size:14px}

/* MAIN */
.main{position:relative;z-index:1;max-width:100%;margin:0 auto;height:100vh;padding-bottom:0}
.sec{display:none}.sec.active{display:block;height:100%}
.scroll-wrap{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-snap-stop:always;-webkit-overflow-scrolling:touch}
.sub-page{height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:flex-start;padding:0;overflow-y:auto;position:relative;max-width:100%;margin:0;width:100%;gap:0}
#s-intro .sub-page{padding:0!important;max-width:100%!important;border-radius:0!important;overflow:hidden!important;height:100vh!important}
#s-overview .sub-page{padding:0!important;max-width:100%!important;border-radius:0!important;overflow:hidden!important;height:100vh!important}
#s-overview .sub-page{padding:0!important;max-width:100%!important;border-radius:0!important;overflow:hidden!important;height:100vh!important}
#s-overview .cpnl{display:flex!important;flex-direction:column!important;justify-content:center!important;background:#f6f0df!important;flex:1!important;margin:0!important;height:100%!important}
#s-overview .cpnl{display:flex!important;flex-direction:column!important;justify-content:center!important;padding-top:68px!important;background:#f6f0df!important}
.sub-page>*{flex:1;min-height:0;margin:0}
.sub-page::-webkit-scrollbar{width:4px}
.sub-page::-webkit-scrollbar-thumb{background:rgba(139,100,50,0.15);border-radius:2px}
/* Scroll indicator */
.ov-btn{padding:10px 18px;background:linear-gradient(180deg,#f6f0df,#e8dcc8);border:1px solid rgba(140,107,72,0.25);color:#4a3020;font-family:var(--font-serif);font-size:13px;font-weight:700;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:all .25s;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.ov-btn:hover{background:linear-gradient(180deg,#ede0c8,#ddd0b8)}
.scroll-ind{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#c8a060;font-size:24px;animation:bounce 1.5s infinite;pointer-events:none;z-index:10;text-shadow:0 0 6px rgba(0,0,0,0.3)}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);opacity:0.7}50%{transform:translateX(-50%) translateY(10px);opacity:1}}

/* STAT CARDS */
.scards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.scard{background:rgba(246,240,223,0.3);border:none;border-radius:var(--radius);padding:22px 24px;transition:all .2s ease;cursor:default;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(34,34,34,0.04)}
.scard::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(140,107,72,0.04),transparent 60%);border-radius:50%}
.scard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,34,34,0.1);background:rgba(248,242,226,0.45)}
.scard:active{transform:scale(.98)}
.scard.clickable{cursor:pointer}.scard.clickable:hover{box-shadow:0 6px 20px rgba(92,32,24,0.14)}
.scard .si{font-size:28px;margin-bottom:6px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))}.scard .sv{font-size:30px;font-weight:700;font-family:var(--font-serif);text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.scard .sl{font-size:12px;color:var(--ink3);margin-top:2px;font-weight:600}
.scard:nth-child(1) .sv{color:#5c2018}.scard:nth-child(2) .sv{color:#8c6b48}.scard:nth-child(3) .sv{color:#4a6b50}.scard:nth-child(4) .sv{color:#3a4a60}

/* CHART GRID */
.crow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.crow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.crow12{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:16px}
.crow21{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.cpnl{background:rgba(246,240,223,0.3);border:none;border-radius:var(--radius);padding:22px;transition:all .2s ease;box-shadow:0 2px 12px rgba(34,34,34,0.05);position:relative}
.cpnl::after{content:none}
.cpnl:hover{box-shadow:0 4px 20px rgba(34,34,34,0.1);background:rgba(248,242,226,0.4)}
.cpnl:active{transform:scale(.995)}
.cpnl.fw{grid-column:1/-1}
.ptitle{font-family:var(--font-serif);font-size:15px;font-weight:700;margin-bottom:3px;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;color:var(--ink)}
.ptitle::before{content:'';display:inline-block;width:4px;height:18px;background:linear-gradient(180deg,var(--red2),var(--gold));border-radius:2px}
.psub{font-size:11px;color:var(--ink4);margin-bottom:16px;font-weight:600}
.ct{width:100%}.ct.h300{height:300px}.ct.h350{height:350px}.ct.h380{height:380px}.ct.h400{height:400px}.ct.h420{height:420px}.ct.h450{height:450px}.ct.h500{height:500px}.ct.h550{height:550px}.ct.h600{height:600px}.ct.h650{height:650px}

/* SEARCH DROPDOWN */
.sr{display:none;position:absolute;top:100%;left:0;right:0;margin-top:8px;background:linear-gradient(180deg,#fdf9f2 0%,#f8f0e0 100%);border:1px solid var(--border2);border-radius:var(--radius2);max-height:400px;overflow-y:auto;box-shadow:0 8px 32px rgba(44,24,16,0.12);z-index:200}
.sr.show{display:block}.sri{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:all .2s}
.sri:hover{background:var(--bg2)}.sri .rt{font-weight:600;font-size:14px;color:var(--ink2)}.sri .rm{font-size:11px;color:var(--ink4);margin-top:2px}.sri .rc{font-size:11px;color:var(--gold);margin-top:2px}
.sri:first-child{border-radius:var(--radius2) var(--radius2) 0 0}.sri:last-child{border-radius:0 0 var(--radius2) var(--radius2)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(44,24,16,0.6);z-index:500;align-items:center;justify-content:center}
.mo.show{display:flex}.mc{background:linear-gradient(180deg,#f6f0df 0%,#efe6cf 100%);border:none;border-radius:var(--radius);padding:24px;max-width:440px;max-height:80vh;overflow-y:auto;width:90%;animation:mi .35s ease;box-shadow:0 12px 40px rgba(44,24,16,0.12)}
@keyframes mi{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.mcl{position:sticky;top:0;float:right;background:none;border:none;color:var(--ink4);font-size:26px;cursor:pointer;line-height:1}
.mcl:hover{color:var(--red)}.mt{font-family:var(--font-serif);font-size:24px;font-weight:700;margin-bottom:18px;color:var(--ink)}
.ms{margin-bottom:18px}.ms h4{font-size:13px;color:var(--red);margin-bottom:6px;letter-spacing:1px}.ms p{font-size:13px;color:var(--ink3);line-height:1.9}
.mtags{display:flex;flex-wrap:wrap;gap:6px}
.mtag{padding:4px 12px;border-radius:14px;font-size:11px;background:rgba(184,134,11,0.08);color:var(--gold);border:1px solid rgba(184,134,11,0.2)}

/* HERO BANNER */
.hero{border-radius:0;padding:80px 64px;margin-bottom:0;display:flex;flex-direction:column;justify-content:center;height:100vh;color:#1a0800;position:relative;overflow:hidden;border:none;background:url('bg_hero.png') center/cover no-repeat;box-shadow:0 4px 20px rgba(34,34,34,0.08)}
.hero::before{content:'';position:absolute;inset:0;background:rgba(255,252,245,0.35);z-index:0;pointer-events:none}
.hero>*{position:relative;z-index:1}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='2' fill='rgba(255,255,255,0.05)'/%3E%3Ccircle cx='40' cy='15' r='1.5' fill='rgba(255,255,255,0.04)'/%3E%3Ccircle cx='70' cy='5' r='2.5' fill='rgba(255,255,255,0.03)'/%3E%3Ccircle cx='20' cy='50' r='1' fill='rgba(255,255,255,0.06)'/%3E%3Ccircle cx='60' cy='60' r='2' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E")}
.hero>*{position:relative;z-index:1}
.hero h1{font-family:var(--font-serif);font-size:36px;font-weight:900;letter-spacing:6px;margin-bottom:8px}
.hero h1 span{color:var(--gold2)}
.hero .hero-sub{font-size:14px;opacity:.8;letter-spacing:2px;margin-bottom:16px}
.hero .hero-desc{font-size:13px;opacity:.75;max-width:700px;line-height:1.8}

/* TIMELINE */
.tl-panel{position:relative;overflow:hidden}
.tl-panel::before{content:'';position:absolute;inset:0;background:url('bg_timeline.png') center/cover no-repeat;opacity:.70;z-index:0;pointer-events:none}
.tl-panel .ptitle,.tl-panel .psub{position:relative;z-index:1}
.tl-panel .ptitle{color:#1a0800}
.tl-panel .psub{color:#3d2818}
.role-panel,.style-panel,.wc-panel{position:relative;overflow:hidden;background:rgba(246,240,223,0.3)!important}
#s-role,#s-network,#s-theme,#s-compare{padding-top:68px}
#s-role .cpnl,#s-network .cpnl,#s-theme .cpnl,#s-compare .cpnl{background:rgba(246,240,223,0.3)!important}
.wc-panel::before{content:'';position:absolute;inset:0;background:url('bg_wc.png') center/cover no-repeat;opacity:.7;z-index:0;pointer-events:none}
.wc-panel>*{position:relative;z-index:1}
.src-panel{position:relative;overflow:hidden;background:rgba(246,240,223,0.3)!important}
.src-panel::before{content:'';position:absolute;inset:0;background:url('bg_src.png') center/cover no-repeat;opacity:.7;z-index:0;pointer-events:none}
.src-panel>*{position:relative;z-index:1}
.bot-panel{position:relative;overflow:hidden}
.bot-panel::before{content:'';position:absolute;inset:0;background:url('bg_bottom.png') center/cover no-repeat;opacity:.7;z-index:0;pointer-events:none}
.bot-panel>*{position:relative;z-index:1}
.bot-panel .ptitle{color:#1a0800;font-size:17px;font-weight:800}
.bot-panel .psub{color:#3d1808;font-weight:600}
.timeline{position:relative;padding:30px 0;z-index:1}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#d4a574,#c41e3a,#b8860b,#c41e3a,#d4a574);border-radius:2px;box-shadow:0 0 12px rgba(184,134,11,0.15)}
.tle{display:flex;align-items:flex-start;margin-bottom:32px;position:relative;opacity:0;transform:translateY(20px);animation:tlFadeIn .6s ease forwards}
.tle:nth-child(1){animation-delay:0s}.tle:nth-child(2){animation-delay:.12s}.tle:nth-child(3){animation-delay:.24s}.tle:nth-child(4){animation-delay:.36s}.tle:nth-child(5){animation-delay:.48s}.tle:nth-child(6){animation-delay:.6s}
@keyframes tlFadeIn{to{opacity:1;transform:translateY(0)}}
.tle:nth-child(odd){flex-direction:row}.tle:nth-child(even){flex-direction:row-reverse}
.tle .tldot{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#c41e3a,#8b1a1a);border:3px solid #f0dbb0;position:absolute;left:50%;transform:translateX(-50%);z-index:2;box-shadow:0 0 0 6px rgba(184,134,11,0.1),0 0 16px rgba(194,58,43,0.2);transition:all .3s}
.tle:hover .tldot{box-shadow:0 0 0 10px rgba(184,134,11,0.2),0 0 24px rgba(194,58,43,0.35);transform:translateX(-50%) scale(1.3)}
.tle .tlcontent{width:43%;padding:20px 24px;background:linear-gradient(135deg,rgba(250,243,224,0.5) 0%,rgba(240,219,181,0.5) 100%);border:1px solid rgba(184,134,11,0.3);border-radius:10px;box-shadow:0 3px 16px rgba(139,100,20,0.08);transition:all .35s;position:relative}
.tle .tlcontent:hover{border-color:var(--gold2);box-shadow:0 6px 28px rgba(44,24,16,0.12);transform:translateY(-3px)}
.tle .tlcontent:hover::before{border-color:var(--gold2)}
.tle .tlcontent::before{content:'';position:absolute;top:20px;width:10px;height:10px;background:linear-gradient(135deg,rgba(250,243,224,0.5),rgba(240,219,181,0.5));border:1px solid var(--border);transform:rotate(45deg)}
.tle:nth-child(odd) .tlcontent::before{right:-6px;border-left:none;border-bottom:none}
.tle:nth-child(even) .tlcontent::before{left:-6px;border-right:none;border-top:none}
.tle .tlyear{font-family:var(--font-serif);font-size:20px;font-weight:900;color:#3d1008;letter-spacing:2px;display:flex;align-items:center;gap:8px}
.tle .tlyear::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold3),transparent)}
.tle:nth-child(even) .tlyear::after{display:none}
.tle:nth-child(even) .tlyear::before{content:'';flex:1;height:1px;background:linear-gradient(270deg,var(--gold3),transparent)}
.tle .tltext{font-size:13px;color:#3d2818;margin-top:8px;line-height:1.8}
.tle .tlextra{font-size:12px;color:#5c3a28;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);line-height:1.7}

/* FOOTER */
.footer{display:none}

/* LOADING */
.ld{display:flex;align-items:center;justify-content:center;padding:100px 20px}.ls{width:40px;height:40px;border:3px solid var(--gold3);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;margin-right:14px}
@keyframes sp{to{transform:rotate(360deg)}}.ltx{color:var(--ink3);font-size:14px}

/* NETWORK FILTER */
.nfbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.nfbar input{padding:7px 14px;border:1px solid var(--border2);border-radius:20px;font-family:inherit;font-size:12px;outline:none;background:var(--card);color:var(--ink);width:200px}
.nfbar input:focus{border-color:var(--gold)}.nfbar .nfcount{font-size:11px;color:var(--ink4);display:flex;align-items:center}

/* RESPONSIVE */
@media(max-width:1400px){.crow3{grid-template-columns:1fr 1fr}}
@media(max-width:1000px){.crow,.crow3,.crow12,.crow21{grid-template-columns:1fr}.scards{grid-template-columns:repeat(2,1fr)}.hnav button{font-size:11px;padding:6px 10px}.hsearch{width:160px}}
@media(max-width:640px){.main{padding:16px}.header{padding:0 12px}.hnav{display:none}}

/* SECTION HEADER */
.sech{text-align:center;padding:24px 0 16px}.sech h2{font-family:var(--font-serif);font-size:28px;color:var(--ink);letter-spacing:3px}.sech h2 span{color:var(--red)}.sech p{color:var(--ink4);font-size:13px;margin-top:4px;letter-spacing:1px}

/* NUMBER ANIMATION */
.num-up{transition:all .6s ease-out}

/* OVERVIEW CHART INFO BOX */
.ov-wrap{display:flex;gap:16px;height:100%;align-items:stretch}
.ov-info{width:280px;flex-shrink:0;background:linear-gradient(180deg,rgba(253,248,240,0.92) 0%,rgba(246,240,223,0.88) 100%);border:1px solid rgba(184,134,11,0.2);border-radius:var(--radius);padding:22px 18px;display:flex;flex-direction:column;box-shadow:0 2px 12px rgba(44,24,16,0.06);position:relative;overflow:hidden}
.ov-info::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red2),var(--gold),var(--jade));border-radius:var(--radius) var(--radius) 0 0}
.ov-info::after{content:'';position:absolute;bottom:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(184,134,11,0.06),transparent 70%);border-radius:50%}
.ov-info-t{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--red);letter-spacing:2px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed rgba(184,134,11,0.25);position:relative;z-index:1}
.ov-info-t::before{content:'◆';color:var(--gold);margin-right:6px;font-size:12px}
.ov-info-d{flex:1;font-size:12.5px;color:var(--ink3);line-height:2;position:relative;z-index:1;overflow-y:auto}
.ov-info-d::-webkit-scrollbar{width:3px}
.ov-info-d::-webkit-scrollbar-thumb{background:rgba(139,100,50,0.15);border-radius:2px}
.ov-info-d p{margin-bottom:10px}
.ov-info-d b{color:var(--red2);font-weight:700}
.ov-info-d .highlight{background:linear-gradient(180deg,transparent 60%,rgba(184,134,11,0.15) 60%);padding:0 2px}
.ov-info-d .stat-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px}
.ov-info-d .stat-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
.ov-chart-wrap{flex:1;position:relative;min-width:0}
.ov-chart{display:flex!important;flex-direction:column}
.ov-chart>div{height:100%}
@media(max-width:600px){.ov-info{display:none}}

/* CHART ANIMATION */
@keyframes chartFadeIn{from{opacity:0;transform:translateY(20px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes chartSlideIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGrow{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}

// ======== SCROLL-SNAP WRAPPER ========
function wrapScrollSnap(){
  var secs=['s-intro','s-overview'];
  // 5 button toggle for overview
  setTimeout(function(){
    var btns=document.querySelectorAll('.ov-btn');
    btns.forEach(function(b){b.addEventListener('click',function(){
      btns.forEach(function(x){x.classList.remove('active');x.style.background='linear-gradient(180deg,#f6f0df,#e8dcc8)';x.style.color='#4a3020'});this.classList.add('active');this.style.background='linear-gradient(180deg,#8b6b48,#6b4b30)';this.style.color='#fff';
      var c=this.dataset.chart;document.querySelectorAll('.ov-chart').forEach(function(x){x.style.opacity='0';x.style.pointerEvents='none';x.style.position='absolute';x.style.top='0';x.style.left='0'});
      var t=document.getElementById('ov-c'+c);if(t){t.style.opacity='1';t.style.pointerEvents='auto';t.style.position='relative';var info=t.querySelector('.ov-info');if(info){info.classList.remove('ov-anim');void info.offsetWidth;info.classList.add('ov-anim')}setTimeout(function(){Object.keys(ch).forEach(function(k){try{ch[k].resize()}catch(e){}})},100)}
    })});
  },1500);
  secs.forEach(function(id){
    var sec=$(id);if(!sec)return;
    var wrap=document.createElement('div');wrap.className='scroll-wrap';
    var children=Array.from(sec.children);
    // For intro: each major block = its own sub-page
    // For others: group 2 per sub-page
    var plan=(id==='s-intro'||id==='s-overview')?[1,1]:[2,2,2,2,2,2,2,2,2,2];
    var sub=document.createElement('div');sub.className='sub-page';var cnt=0,pi=0;
    children.forEach(function(child,i){
      sub.appendChild(child);cnt++;
      var limit=plan[pi]||2;
      if(cnt>=limit&&i<children.length-1){
        wrap.appendChild(sub);sub=document.createElement('div');sub.className='sub-page';
        cnt=0;pi++;
      }
    });
    if(sub.children.length>0)wrap.appendChild(sub);
    // Remove scroll indicator for cleaner look
    // Footer at bottom of last page (skip intro which has its own)
    if(id!=='s-intro'){
      var ft=document.createElement('div');ft.style.cssText='text-align:center;padding:8px 32px;font-size:11px;color:#000;letter-spacing:1px;font-weight:600;position:absolute;bottom:0;left:0;right:0;z-index:5';
      ft.innerHTML='数据来源：中国京剧戏考 · 京剧汇编 · 戏考大全 · 名家演出剧本选集等 &nbsp;|&nbsp; 1,473部京剧剧本 · 7,896条角色记录 &nbsp;|&nbsp; ChinaVis 2026 可视化竞赛作品';
      // Append to last panel in sub-page instead of sub-page itself
      var panels=sub.querySelectorAll('.cpnl');
      if(panels.length>0){panels[panels.length-1].appendChild(ft);panels[panels.length-1].style.position='relative'}else{sub.appendChild(ft)}
    }
    while(sec.firstChild)sec.removeChild(sec.firstChild);
    sec.appendChild(wrap);
  });
  // CSS scroll-snap handles page switching natively
}

  // Chart 1: 目录分类
  h+='<div class="ov-chart" id="ov-c1" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none"><div class="ov-wrap"><div class="ov-info"><div class="ov-info-t">目录分类分布</div><div class="ov-info-d"><p>本图以 <b>玫瑰图（南丁格尔图）</b> 形式展示京剧剧本的目录分类结构。全部分为 <b>38个</b> 原始目录，归纳为戏考·传统剧目、戏考·家庭伦理、戏考·历史剧目、戏考·公案剧目、京剧汇编、名家演出本等大类。</p><p><span class="highlight">戏考·传统剧目</span>以448部居首，占比最高；戏考·家庭伦理360部次之。玫瑰图通过扇区面积直观呈现各类别占比差异，扇区半径越大代表该类别剧本数量越多。</p><div class="stat-row"><span class="stat-dot"></span>面积大小反映各类别剧本数量</div><div class="stat-row"><span class="stat-dot"></span>颜色区分不同目录大类</div><div class="stat-row"><span class="stat-dot"></span>悬停查看具体数值与百分比</div></div></div><div class="ov-chart-wrap"><div class="ct" id="c-ov-sun" style="height:100%"></div></div></div></div>';
  // Chart 2: 篇幅分布
  h+='<div class="ov-chart" id="ov-c2" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none"><div class="ov-wrap"><div class="ov-info"><div class="ov-info-t">剧本篇幅分布</div><div class="ov-info-d"><p>本图以 <b>环形图</b> 展示1,473部京剧剧本的篇幅长度分布。篇幅按字符数划分为短篇(<1K)、中短篇(1K-3K)、中篇(3K-6K)、中长篇(6K-10K)、长篇(10K-20K)、超长篇(>20K)六个区间。</p><p>从图中可以看出，<span class="highlight">中短篇(1K-3K)</span> 和 <span class="highlight">短篇(<1K)</span> 剧本占比较高，反映了传统京剧剧本以精炼见长、注重唱念做打综合表演而非冗长叙事的艺术特点。超长剧本多为连台本戏或全本大戏。</p><div class="stat-row"><span class="stat-dot"></span>环形图内外半径展示占比关系</div><div class="stat-row"><span class="stat-dot"></span>六档篇幅区间覆盖全部剧本</div><div class="stat-row"><span class="stat-dot"></span>悬停查看各区间具体数量</div></div></div><div class="ov-chart-wrap"><div class="ct" id="c-ov-len" style="height:100%"></div></div></div></div>';

function _build3D(container, THREE, OrbitControls, CSS2DRenderer, CSS2DObject){
  var W=container.clientWidth||500,H=container.clientHeight||420;
  var scene=new THREE.Scene();
  scene.background=new THREE.Color('#e3d5ba');
  var camera=new THREE.PerspectiveCamera(40,W/H,0.3,30);
  camera.position.set(5,3.5,7);camera.lookAt(0,2.2,0);

  renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.5;

  labelRenderer.setSize(W,H);labelRenderer.domElement.style.position='absolute';labelRenderer.domElement.style.top='0';labelRenderer.domElement.style.pointerEvents='none';
  container.appendChild(labelRenderer.domElement);
  var controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0,2.2,0);controls.enableDamping=true;controls.dampingFactor=0.1;
  controls.minPolarAngle=0.2;controls.maxPolarAngle=Math.PI*0.7;controls.minDistance=4;controls.maxDistance=15;
  controls.autoRotate=true;controls.autoRotateSpeed=0.5;controls.update();
  _3dScene=scene;_3dRenderer=renderer;_3dCamera=camera;_3dLabelRenderer=labelRenderer;_3dControls=controls;

  // Lights
  scene.add(new THREE.AmbientLight('#e8dcc8',3));
  var kl=new THREE.DirectionalLight('#fffdf8',4);kl.position.set(5,8,5);kl.castShadow=true;kl.shadow.mapSize.set(1024,1024);kl.shadow.camera.near=0.3;kl.shadow.camera.far=30;kl.shadow.camera.left=-8;kl.shadow.camera.right=8;kl.shadow.camera.top=8;kl.shadow.camera.bottom=-8;kl.shadow.bias=-0.0005;kl.shadow.normalBias=0.02;scene.add(kl);
  scene.add(new THREE.DirectionalLight('#ffccaa',2).position.set(-4,3,-3));
  scene.add(new THREE.PointLight('#886644',4,10).position.set(0,-0.3,0));

  // Ground
  var gm=new THREE.Mesh(new THREE.CircleGeometry(5,64),new THREE.MeshStandardMaterial({color:'#d9c9a8',roughness:0.5}));
  gm.rotation.x=-Math.PI/2;gm.position.y=-0.05;gm.receiveShadow=true;scene.add(gm);

  // Rings
  [2.2,2.4].forEach(function(r){
    var tm=new THREE.Mesh(new THREE.TorusGeometry(r,0.025,12,80),new THREE.MeshStandardMaterial({color:'#b8860b',emissive:'#664400',emissiveIntensity:0.5,roughness:0.3}));
    tm.rotation.x=-Math.PI/2;tm.position.y=0.01;scene.add(tm);
  });

  // Axis
  var ax=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,5.5,32),new THREE.MeshStandardMaterial({color:'#b8860b',emissive:'#553300',emissiveIntensity:0.4,roughness:0.2,metalness:0.8}));
  ax.position.y=2.75;ax.castShadow=true;scene.add(ax);

  // Axis top
  var sp=new THREE.Mesh(new THREE.SphereGeometry(0.15,32,32),new THREE.MeshStandardMaterial({color:'#d4a520',emissive:'#aa7700',emissiveIntensity:1,roughness:0.1,metalness:0.9}));
  sp.position.y=5.55;scene.add(sp);

  // Base
  var bs=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,0.25,32),new THREE.MeshStandardMaterial({color:'#d4a520',emissive:'#886600',emissiveIntensity:0.6,roughness:0.1,metalness:0.9}));
  bs.position.y=0.12;scene.add(bs);

  // Tick marks every 20%
  for(var i=20;i<=100;i+=20){
    var y=i/100*5.5, t=new THREE.Mesh(new THREE.TorusGeometry(0.12,0.01,8,32),new THREE.MeshStandardMaterial({color:'#998877',roughness:0.4}));
    t.position.y=y;t.rotation.x=Math.PI/2;scene.add(t);
    var d=document.createElement('div');d.textContent=i+'%';d.style.cssText='color:#887766;font-size:9px;font-family:monospace';
    var lo=new CSS2DObject(d);lo.position.set(0.25,y,0);scene.add(lo);
  }

  // Steps
  var data=[{name:'生\n老生·小生·武生·红生',value:3091,pct:39.2,color:'#bc4a4a'},
    {name:'旦\n正旦·花旦·老旦·武旦',value:1436,pct:18.2,color:'#d48085'},
    {name:'净\n铜锤·架子·武花脸',value:1317,pct:16.7,color:'#c4a030'},
    {name:'丑\n文丑·武丑·小丑',value:1093,pct:13.9,color:'#7aaa7a'},
    {name:'其他\n外·末·杂·贴',value:959,pct:12.2,color:'#b0a090'}];
  var total=7896,ir=0.3,_or=2.2,totalAngle=Math.PI*1.5,cy=0.25,stepGap=0.04;

  data.forEach(function(d,i){
    var h=(d.value/total)*5.5, sa=(i/data.length)*totalAngle, as=totalAngle/data.length*0.85;
    var shape=new THREE.Shape(),seg=40;
    for(var s=0;s<=seg;s++){var a=sa+(s/seg)*as,r=_or;s===0?shape.moveTo(Math.cos(a)*r,Math.sin(a)*r):shape.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
    for(var s=seg;s>=0;s--){var a=sa+(s/seg)*as,r=ir;shape.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
    shape.closePath();
    var geo=new THREE.ExtrudeGeometry(shape,{steps:1,depth:h,bevelEnabled:true,bevelThickness:0.03,bevelSize:0.03,bevelSegments:3});
    geo.rotateX(-Math.PI/2);geo.translate(0,cy,0);
    var mat=new THREE.MeshStandardMaterial({color:d.color,roughness:0.35,metalness:0.2});
    var mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;mesh.receiveShadow=true;scene.add(mesh);

    // Top highlight
    var topY=cy+h,hs=new THREE.Shape();
    for(var s=0;s<=seg;s++){var a=sa+(s/seg)*as,r=_or+0.01;s===0?hs.moveTo(Math.cos(a)*r,Math.sin(a)*r):hs.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
    for(var s=seg;s>=0;s--){var a=sa+(s/seg)*as,r=ir-0.01;hs.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
    hs.closePath();
    var hg=new THREE.ShapeGeometry(hs);hg.rotateX(-Math.PI/2);hg.translate(0,topY+0.001,0);
    scene.add(new THREE.Mesh(hg,new THREE.MeshBasicMaterial({color:'#ffffff',transparent:true,opacity:0.12})));

    // Edge glow
    var ep=[];for(var s=0;s<=seg;s++){var a=sa+(s/seg)*as;ep.push(new THREE.Vector3(Math.cos(a)*_or,topY+0.01,Math.sin(a)*_or))}
    var ec=new THREE.CatmullRomCurve3(ep,true);
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(ec,48,0.012,8,true),new THREE.MeshBasicMaterial({color:'#ffdd88',transparent:true,opacity:0.4})));

    // CSS2D Label
    var ma=sa+as/2,lr=_or+0.6,lx=Math.cos(ma)*lr,lz=Math.sin(ma)*lr,ly=cy+h/2;
    var dd=document.createElement('div');dd.textContent=d.name.split('\n')[0]+' '+d.pct+'%';
    dd.style.cssText='color:#2c1000;font-size:12px;font-weight:bold;white-space:nowrap;text-shadow:0 0 0 3px rgba(255,255,255,0.9),0 0 0 5px rgba(255,255,255,0.6)';
    var lo2=new CSS2DObject(dd);lo2.position.set(lx,ly,lz);scene.add(lo2);

    // Connector
    var cp=[new THREE.Vector3(Math.cos(ma)*(_or+0.1),ly,Math.sin(ma)*(_or+0.1)),new THREE.Vector3(lx,ly,lz)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(cp),new THREE.LineBasicMaterial({color:'#998877',transparent:true,opacity:0.45})));

    cy+=h+stepGap;
  });

  // Particles
  var pc=150,pg=new THREE.BufferGeometry(),pp=new Float32Array(pc*3);
  for(var i=0;i<pc;i++){var a=Math.random()*Math.PI*2,r=1.5+Math.random()*4,hh=Math.random()*5.7;pp[i*3]=Math.cos(a)*r;pp[i*3+1]=hh;pp[i*3+2]=Math.sin(a)*r}
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
  var particles=new THREE.Points(pg,new THREE.PointsMaterial({color:'#b8860b',size:0.025,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending}));
  scene.add(particles);

  // Animation
  function anim(){_3dAnimId=requestAnimationFrame(anim);controls.update();particles.rotation.y+=0.0003;renderer.render(scene,camera);labelRenderer.render(scene,camera)}
  anim();

  // Handle window resize
  window.addEventListener('resize',function(){
    var w=container.clientWidth,h=container.clientHeight;if(w<=0||h<=0)return;
    camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);labelRenderer.setSize(w,h);
  });
}

function upNetFilter(){
  var q=$('nw-filt').value.toLowerCase();
  var ns=window._netNodes,es=window._netEdges;
  if(!q){rNetGraph(ns,es);return}
  var fn=ns.filter(function(n){return n.name.toLowerCase().indexOf(q)>=0});
  var fns=new Set(fn.map(function(n){return n.name}));
  var fe=es.filter(function(e){return fns.has(e.source)||fns.has(e.target)});
  var allN=new Set();fe.forEach(function(e){allN.add(e.source);allN.add(e.target)});
  var nn=ns.filter(function(n){return allN.has(n.name)});
  rNetGraph(nn,fe);
}

// ECharts loading: local -> bootcdn -> jsdelivr -> timeout
(function(){
  var urls=[
    'echarts.min.js',
    'https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js',
    'https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js'
  ];
  var timeout=setTimeout(function(){
    $('ld').innerHTML='<div style="text-align:center;padding:40px;color:#8b1a1a"><h3>⚠ ECharts加载超时</h3><p style="color:#8b7355">请确保 echarts.min.js 与HTML在同一目录<br>或将HTML部署到Web服务器通过CDN加载</p></div>';
  },25000);
  function load(idx){
    if(idx>=urls.length){clearTimeout(timeout);return;}
    var s=document.createElement('script');
    s.src=urls[idx];
    s.onload=function(){
      clearTimeout(timeout);
      // Load wordcloud
      window._hasWordcloud=false;
      var sw=document.createElement('script');
      sw.src='echarts-wordcloud.min.js';
      sw.onerror=function(){
        var sw2=document.createElement('script');
        sw2.src='https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js';
        sw2.onload=function(){window._hasWordcloud=true};
        document.head.appendChild(sw2);
      };
      sw.onload=function(){window._hasWordcloud=true};
      document.head.appendChild(sw);
      initApp();
    };
    s.onerror=function(){load(idx+1)};
    document.head.appendChild(s);
  }
  load(0);
})();
</script>
